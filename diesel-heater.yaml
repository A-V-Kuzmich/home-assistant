script:
  - id: start_sequence
    mode: single 
    then:
      - output.turn_on: physical_pin_power
      - delay: 200ms
      - output.turn_off: physical_pin_power
      - wait_until:
          condition:
            binary_sensor.is_on: heater_stable_status
          timeout: 120s
      - delay: 5s

  - id: stop_sequence
    mode: single
    then:
      - output.turn_on: physical_pin_power
      - delay: 2000ms 
      - output.turn_off: physical_pin_power
      - wait_until:
          condition:
            binary_sensor.is_off: heater_stable_status
          timeout: 180s
      - delay: 5s

  - id: update_heater_status_text
    mode: restart
    then:
      - lambda: |-
          auto *ts = id(heater_status_text);

          int err = (int) id(raw_error_code).state;
          int st  = (int) id(raw_run_state).state;

          if (err > 0) {
            switch(err) {
              case 2: ts->publish_state("Error E-01 (Volt Low)"); break;
              case 3: ts->publish_state("Error E-02 (Volt High)"); break;
              case 4: ts->publish_state("Error E-03 (Ignition plug failure)"); break;
              case 5: ts->publish_state("Error E-04 (Pump Fail)"); break;
              case 6: ts->publish_state("Error E-05 (Overheat)"); break;
              case 7: ts->publish_state("Error E-06 (Motor Fail)"); break;
              case 8: ts->publish_state("Error E-07 (Com Lost)"); break;
              case 9: ts->publish_state("Error E-08 (Flameout)"); break;
              case 10: ts->publish_state("Error E-09 (Sensor Fail)"); break;
              case 11: ts->publish_state("Error E-10 (Ignition)"); break;
              default:
                ts->publish_state(("Error E-" + to_string(err)).c_str());
                break;
            }
            return;
          }

          switch(st) {
            case 0: ts->publish_state("Off"); break;
            case 1: ts->publish_state("Starting"); break;
            case 2: ts->publish_state("Pre-Heating"); break;
            case 3: ts->publish_state("Failed Start - Retrying"); break;
            case 4: ts->publish_state("Ignition - Now heating up"); break;
            case 5: ts->publish_state("Running Normally"); break;
            case 6: ts->publish_state("Stop Command Received"); break;
            case 7: ts->publish_state("Stopping"); break;
            case 8: ts->publish_state("Cooldown"); break;
            default:
              ts->publish_state(("Unknown (" + to_string(st) + ")").c_str());
              break;
          }
